# py3DCal conda 환경 정의 (CUDA 빌드)
#
# 생성:   conda env create -f environment.yml
# 활성화: conda activate py3dcal
# 갱신:   conda env update -f environment.yml --prune
#
# 참고:
# - torch / torchvision 은 PyPI 기본 휠 대신 PyTorch 의 CUDA 12.8 휠을
#   사용한다 (--extra-index-url). setup.py 의 torchvision>=0.23.0 요구사항을
#   만족시키기 위해 cu128 인덱스를 사용한다.
# - GPU 가 없는 환경에서는 아래 extra-index-url 을
#   https://download.pytorch.org/whl/cpu 로 바꾸면 CPU 전용으로 설치된다.
# - 마지막 줄의 `-e .` 는 이 저장소(py3dcal)를 editable 모드로 설치한다.
name: py3dcal
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch>=2.8.0
      - torchvision>=0.23.0
      - numpy>=1.0.0
      - matplotlib>=3.0.0
      - pandas>=2.0.0
      - scipy>=1.0.0
      - pyserial>=3.0
      - opencv-python>=4.0.0
      - pillow>=11.0.0
      - tqdm>=4.0.0
      - requests>=2.0.0
      - scikit-learn>=1.0.0
      - digit-interface>=0.2.1
      - -e .
